    <style>
        /* সব স্টাইল আগের মতোই থাকবে */

        .step {

        @keyframes fadeUp {

        .input-group {

        .phone-row select:focus {

        @media (max-width: 480px) {

    </style>
</head>
<body>

                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />

                    <label>ফোন নম্বর</label>

            <div class="step" id="regStep2">
                <p style="font-size:14px;color:#606770;text-align:center;margin-bottom:4px;">
                    <span id="regPhoneDisplay"></span> নম্বরে OTP পাঠানো হয়েছে
                </p>
                <div class="otp-container" id="regOtpContainer">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                </div>

                <div class="resend-info">
                    <span id="regTimerText">৬০ সেকেন্ড পর পুনরায় চেষ্টা করুন</span>
                    <br />
                    <span id="regResendLink" class="link" style="display:none;">পুনরায় OTP পাঠান</span>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none;">
        <div class="dashboard">
            <div class="avatar" id="userAvatar">A</div>
            <h2 id="userNameDisplay">ব্যবহারকারী</h2>
            <p id="userPhoneDisplay">+880xxxxxxxx</p>
            <button class="btn-primary" id="logoutBtn" style="background:#e74c3c;width:100%;">লগআউট করুন</button>
        </div>

    <script type="module">
        // ----- Firebase Imports -----
        import { initializeApp } from 'firebase/app';
        import {
            getAuth,
            signInWithPhoneNumber,
            RecaptchaVerifier,
            onAuthStateChanged,
            updateProfile,
            signOut
        } from 'firebase/auth';

        // ----- Firebase Config (আপনার দেওয়া) -----
        const firebaseConfig = {
            apiKey: "AIzaSyC7Y7sSRj9xP4kMYbyQgVbqUFUhR1p5iCc",
            authDomain: "lite-8849b.firebaseapp.com",
            projectId: "lite-8849b",
            storageBucket: "lite-8849b.firebasestorage.app",
            messagingSenderId: "290679430768",
            appId: "1:290679430768:web:7b59a556f3116b42099eb5",
            measurementId: "G-43Y77CHXL5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ----- DOM References -----
        const appContainer = document.getElementById('app');
        const dashboard = document.getElementById('dashboard');

        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        const loginStep1 = document.getElementById('loginStep1');
        const loginStep2 = document.getElementById('loginStep2');
        const loginCountry = document.getElementById('loginCountryCode');
        const loginPhone = document.getElementById('loginPhone');
        const loginSendOtpBtn = document.getElementById('loginSendOtpBtn');
        const loginVerifyBtn = document.getElementById('loginVerifyBtn');
        const loginBackBtn = document.getElementById('loginBackBtn');
        const loginPhoneDisplay = document.getElementById('loginPhoneDisplay');
        const loginResendLink = document.getElementById('loginResendLink');
        const loginTimerText = document.getElementById('loginTimerText');
        const loginOtpBoxes = document.querySelectorAll('#loginOtpContainer .otp-box');

        const regStep1 = document.getElementById('regStep1');
        const regStep2 = document.getElementById('regStep2');
        const regName = document.getElementById('regName');
        const regCountry = document.getElementById('regCountryCode');
        const regPhone = document.getElementById('regPhone');
        const regSendOtpBtn = document.getElementById('regSendOtpBtn');
        const regVerifyBtn = document.getElementById('regVerifyBtn');
        const regBackBtn = document.getElementById('regBackBtn');
        const regPhoneDisplay = document.getElementById('regPhoneDisplay');
        const regResendLink = document.getElementById('regResendLink');
        const regTimerText = document.getElementById('regTimerText');
        const regOtpBoxes = document.querySelectorAll('#regOtpContainer .otp-box');

        const userAvatar = document.getElementById('userAvatar');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const userPhoneDisplay = document.getElementById('userPhoneDisplay');
        const logoutBtn = document.getElementById('logoutBtn');

        const switchToRegister = document.getElementById('switchToRegister');
        const switchToLogin = document.getElementById('switchToLogin');

        const toastEl = document.getElementById('toast');
        let toastTimeout = null;

        // ----- Toast -----
        function showToast(message, type = 'info') {
            if (toastTimeout) clearTimeout(toastTimeout);
            toastEl.className = 'toast';
            toastEl.textContent = message;
            if (type === 'error') toastEl.classList.add('error');
            else if (type === 'success') toastEl.classList.add('success');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimeout = null;
            }, 4000);
        }

        // ----- OTP Auto-focus -----
        function setupOtpBoxes(boxes, verifyCallback) {
            boxes.forEach((box, index) => {
                box.addEventListener('input', function() {
                    const val = this.value.replace(/\D/g, '');
                    this.value = val.slice(0, 1);
                    if (val && index < boxes.length - 1) {
                        boxes[index + 1].focus();
                    }
                });
                box.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        boxes[index - 1].focus();
                    }
                    if (e.key === 'Enter') {
                        verifyCallback();
                    }
                });
                box.addEventListener('focus', function() { this.select(); });
            });
        }

        // ----- Timer -----
        let loginTimerInterval = null,
            regTimerInterval = null;
        let loginTimeLeft = 60,
            regTimeLeft = 60;

        function startTimer(step, seconds = 60) {
            const isLogin = step === 'login';
            const timerText = isLogin ? loginTimerText : regTimerText;
            const resendLink = isLogin ? loginResendLink : regResendLink;
            let timeLeft = isLogin ? loginTimeLeft : regTimeLeft;
            let interval = isLogin ? loginTimerInterval : regTimerInterval;

            if (interval) clearInterval(interval);
            timeLeft = seconds;
            if (isLogin) loginTimeLeft = timeLeft;
            else regTimeLeft = timeLeft;

            resendLink.style.display = 'none';
            timerText.style.display = 'block';
            timerText.textContent = `${timeLeft} সেকেন্ড পর পুনরায় চেষ্টা করুন`;

            const newInterval = setInterval(() => {
                timeLeft -= 1;
                if (isLogin) loginTimeLeft = timeLeft;
                else regTimeLeft = timeLeft;
                timerText.textContent = `${timeLeft} সেকেন্ড পর পুনরায় চেষ্টা করুন`;

                if (timeLeft <= 0) {
                    clearInterval(newInterval);
                    timerText.style.display = 'none';
                    resendLink.style.display = 'inline';
                    resendLink.classList.remove('disabled');
                }
            }, 1000);

            if (isLogin) loginTimerInterval = newInterval;
            else regTimerInterval = newInterval;
        }

        // ----- Get Full Phone -----
        function getFullPhone(countrySelect, phoneInput) {
            const code = countrySelect.value;
            const raw = phoneInput.value.replace(/\D/g, '');
            return code + raw;
        }

        // ----- Recaptcha Verifier (একবার তৈরি) -----
        let recaptchaVerifier = null;

        function getRecaptchaVerifier(containerId) {
            if (!recaptchaVerifier) {
                recaptchaVerifier = new RecaptchaVerifier(auth, containerId, {
                    size: 'invisible',
                    callback: () => { /* solved */ }
                });
            }
            return recaptchaVerifier;
        }

        // ==========================================================
        //  SEND LOGIN OTP
        // ==========================================================
        async function sendLoginOtp() {
            const phone = getFullPhone(loginCountry, loginPhone);
            if (phone.length < 10) {
                showToast('⚠️ দয়া করে একটি বৈধ ফোন নম্বর দিন', 'error');
                return;
            }

            loginSendOtpBtn.disabled = true;
            loginSendOtpBtn.innerHTML = '<span class="spinner"></span> OTP পাঠানো হচ্ছে...';

            try {
                const appVerifier = getRecaptchaVerifier('loginSendOtpBtn');
                const confirmation = await signInWithPhoneNumber(auth, phone, appVerifier);
                window.loginConfirmation = confirmation;

                loginPhoneDisplay.textContent = phone;
                loginStep1.classList.remove('active');
                loginStep2.classList.add('active');
                loginOtpBoxes[0].focus();
                startTimer('login', 60);
                showToast(`📲 OTP পাঠানো হয়েছে ${phone} এ`, 'success');
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (error.code === 'auth/invalid-phone-number') msg = 'ভুল ফোন নম্বর ফরম্যাট।';
                else if (error.code === 'auth/too-many-requests') msg = 'অনেক বেশি চেষ্টা, একটু পরে আবার চেষ্টা করুন।';
                else if (error.code === 'auth/operation-not-allowed') {
                    msg = '🔴 Firebase কনসোলে ফোন অথেনটিকেশন চালু করুন।';
                } else if (error.code === 'auth/configuration-not-found') {
                    msg = '🔴 Firebase কনসোলে ফোন অথেনটিকেশন সক্রিয় করুন। এটি এখনও কনফিগার করা হয়নি।';
                }
                showToast('❌ ' + msg, 'error');
            } finally {
                loginSendOtpBtn.disabled = false;
                loginSendOtpBtn.innerHTML = 'OTP পাঠান';
            }
        }

        // ==========================================================
        //  VERIFY LOGIN OTP
        // ==========================================================
        async function verifyLoginOtp() {
            let entered = '';
            loginOtpBoxes.forEach(box => { entered += box.value; });
            if (entered.length !== 6) {
                showToast('⚠️ দয়া করে ৬ ডিজিটের OTP দিন', 'error');
                return;
            }

            loginVerifyBtn.disabled = true;
            loginVerifyBtn.innerHTML = '<span class="spinner"></span> যাচাই হচ্ছে...';

            try {
                const confirmation = window.loginConfirmation;
                if (!confirmation) throw new Error('OTP পাঠানো হয়নি। আবার চেষ্টা করুন।');
                await confirmation.confirm(entered);
                showToast('✅ লগইন সফল!', 'success');
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (error.code === 'auth/invalid-verification-code') msg = 'ভুল OTP। আবার চেষ্টা করুন।';
                else if (error.code === 'auth/code-expired') msg = 'OTP মেয়াদ শেষ। নতুন OTP নিন।';
                showToast('❌ ' + msg, 'error');
                loginOtpBoxes.forEach(box => box.value = '');
                loginOtpBoxes[0].focus();
            } finally {
                loginVerifyBtn.disabled = false;
                loginVerifyBtn.innerHTML = 'ভেরিফাই করুন';
            }
        }

        // ==========================================================
        //  SEND REGISTER OTP
        // ==========================================================
        async function sendRegOtp() {
            const name = regName.value.trim();
            const phone = getFullPhone(regCountry, regPhone);

            if (!name || name.length < 2) {
                showToast('দয়া করে আপনার নাম লিখুন (২ অক্ষরের বেশি)', 'error');
                return;
            }
            if (phone.length < 10) {
                showToast('⚠️ দয়া করে একটি বৈধ ফোন নম্বর দিন', 'error');
                return;
            }

            regSendOtpBtn.disabled = true;
            regSendOtpBtn.innerHTML = '<span class="spinner"></span> OTP পাঠানো হচ্ছে...';

            try {
                const appVerifier = getRecaptchaVerifier('regSendOtpBtn');
                const confirmation = await signInWithPhoneNumber(auth, phone, appVerifier);
                window.regConfirmation = confirmation;
                window.regUserName = name;

                regPhoneDisplay.textContent = phone;
                regStep1.classList.remove('active');
                regStep2.classList.add('active');
                regOtpBoxes[0].focus();
                startTimer('register', 60);
                showToast(`📲 OTP পাঠানো হয়েছে ${phone} এ`, 'success');
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (error.code === 'auth/invalid-phone-number') msg = 'ভুল ফোন নম্বর ফরম্যাট।';
                else if (error.code === 'auth/too-many-requests') msg = 'অনেক বেশি চেষ্টা, একটু পরে আবার চেষ্টা করুন।';
                else if (error.code === 'auth/operation-not-allowed') {
                    msg = '🔴 Firebase কনসোলে ফোন অথেনটিকেশন চালু করুন।';
                } else if (error.code === 'auth/configuration-not-found') {
                    msg = '🔴 Firebase কনসোলে ফোন অথেনটিকেশন সক্রিয় করুন। এটি এখনও কনফিগার করা হয়নি।';
                }
                showToast('❌ ' + msg, 'error');
            } finally {
                regSendOtpBtn.disabled = false;
                regSendOtpBtn.innerHTML = 'পরবর্তী →';
            }
        }

        // ==========================================================
        //  VERIFY REGISTER OTP
        // ==========================================================
        async function verifyRegOtp() {
            let entered = '';
            regOtpBoxes.forEach(box => { entered += box.value; });
            if (entered.length !== 6) {
                showToast('⚠️ দয়া করে ৬ ডিজিটের OTP দিন', 'error');
                return;
            }

            regVerifyBtn.disabled = true;
            regVerifyBtn.innerHTML = '<span class="spinner"></span> নিশ্চিত করা হচ্ছে...';

            try {
                const confirmation = window.regConfirmation;
                if (!confirmation) throw new Error('OTP পাঠানো হয়নি। আবার চেষ্টা করুন।');

                const userCredential = await confirmation.confirm(entered);
                const user = userCredential.user;

                const displayName = window.regUserName || 'ব্যবহারকারী';
                await updateProfile(user, { displayName: displayName });

                showToast(`🎉 স্বাগতম, ${displayName}! অ্যাকাউন্ট তৈরি সফল`, 'success');
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (error.code === 'auth/invalid-verification-code') msg = 'ভুল OTP। আবার চেষ্টা করুন।';
                else if (error.code === 'auth/code-expired') msg = 'OTP মেয়াদ শেষ। নতুন OTP নিন।';
                showToast('❌ ' + msg, 'error');
                regOtpBoxes.forEach(box => box.value = '');
                regOtpBoxes[0].focus();
            } finally {
                regVerifyBtn.disabled = false;
                regVerifyBtn.innerHTML = 'নিশ্চিত করুন';
            }
        }

        // ----- Back -----
        function goBackToLoginPhone() {
            clearInterval(loginTimerInterval);
            loginStep2.classList.remove('active');
            loginStep1.classList.add('active');
            loginOtpBoxes.forEach(box => box.value = '');
        }

        function goBackToRegPhone() {
            clearInterval(regTimerInterval);
            regStep2.classList.remove('active');
            regStep1.classList.add('active');
            regOtpBoxes.forEach(box => box.value = '');
        }

        // ----- Resend -----
        function resendLoginOtp() {
            if (loginTimeLeft > 0) return;
            sendLoginOtp();
        }

        function resendRegOtp() {
            if (regTimeLeft > 0) return;
            sendRegOtp();
        }

        // ----- Tab Switch -----
        function switchTab(tab) {
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                regStep2.classList.remove('active');
                regStep1.classList.add('active');
                clearInterval(regTimerInterval);
                clearInterval(loginTimerInterval);
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                loginStep2.classList.remove('active');
                loginStep1.classList.add('active');
                clearInterval(loginTimerInterval);
                clearInterval(regTimerInterval);
            }
        }

        // ----- Event Listeners -----
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        switchToRegister.addEventListener('click', (e) => { e.preventDefault();
            switchTab('register'); });
        switchToLogin.addEventListener('click', (e) => { e.preventDefault();
            switchTab('login'); });

        loginSendOtpBtn.addEventListener('click', sendLoginOtp);
        loginVerifyBtn.addEventListener('click', verifyLoginOtp);
        loginBackBtn.addEventListener('click', goBackToLoginPhone);
        loginResendLink.addEventListener('click', resendLoginOtp);
        loginPhone.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginSendOtpBtn.click(); });

        regSendOtpBtn.addEventListener('click', sendRegOtp);
        regVerifyBtn.addEventListener('click', verifyRegOtp);
        regBackBtn.addEventListener('click', goBackToRegPhone);
        regResendLink.addEventListener('click', resendRegOtp);
        regPhone.addEventListener('keydown', (e) => { if (e.key === 'Enter') regSendOtpBtn.click(); });

        setupOtpBoxes(loginOtpBoxes, verifyLoginOtp);
        setupOtpBoxes(regOtpBoxes, verifyRegOtp);

        // ----- Auth State Observer -----
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const displayName = user.displayName || 'ব্যবহারকারী';
                const phone = user.phoneNumber || '+880xxxxxxxx';
                userAvatar.textContent = displayName.charAt(0).toUpperCase();
                userNameDisplay.textContent = displayName;
                userPhoneDisplay.textContent = phone;

                appContainer.style.display = 'none';
                dashboard.style.display = 'block';
            } else {
                appContainer.style.display = 'block';
                dashboard.style.display = 'none';
                switchTab('login');
                loginStep1.classList.add('active');
                loginStep2.classList.remove('active');
                regStep1.classList.add('active');
                regStep2.classList.remove('active');
                loginOtpBoxes.forEach(box => box.value = '');
                regOtpBoxes.forEach(box => box.value = '');
                clearInterval(loginTimerInterval);
                clearInterval(regTimerInterval);
                window.loginConfirmation = null;
                window.regConfirmation = null;
            }
        });

        // ----- Logout -----
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                showToast('👋 লগআউট হয়েছে', 'success');
            } catch (error) {
                showToast('❌ লগআউট ব্যর্থ', 'error');
            }
        });

        // শুরুতে লগইন ট্যাব দেখাও
        switchTab('login');
        console.log('📱 Phone Auth ready with Firebase (Project: lite-8849b)');
    </script>
</body>
</html>
